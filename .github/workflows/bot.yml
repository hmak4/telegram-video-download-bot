name: Telegram Download Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'  # প্রতি ৪ ঘন্টা পর পর রান করবে

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # সর্বোচ্চ ৬ ঘন্টা

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # yt-dlp-এর জন্য প্রয়োজনীয় ডিপেন্ডেন্সি
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ffmpeg \
            aria2 \
            wget \
            curl \
            git \
            build-essential
          echo "✅ System dependencies installed:"
          ffmpeg -version | head -n1
          aria2c --version | head -n1

      - name: Upgrade pip and install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo "📦 Installed packages:"
          pip list

      # yt-dlp আপডেট চেক
      - name: Check yt-dlp version
        run: |
          yt-dlp --version || echo "yt-dlp installed via pip"

      - name: Run Telegram Download Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🚀 Starting download bot at $(date)"
          echo "Bot will run continuously with auto-restart on crash"
          
          # লুপ চালু রাখবে (বট ক্র্যাশ হলে আবার চালু করবে)
          while true; do
            echo "🔄 Bot process started at $(date)"
            python bot.py
            EXIT_CODE=$?
            echo "❌ Bot exited with code $EXIT_CODE at $(date)"
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Bot exited normally. Restarting in 5 seconds..."
              sleep 5
            else
              echo "⚠️ Bot crashed. Restarting in 10 seconds..."
              sleep 10
            fi
          done

      - name: Keep workflow alive (fallback)
        if: always()
        run: |
          echo "✅ Workflow completed at $(date)"
          echo "Next run scheduled according to cron"
